<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEU Library - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2e7d52;
      --green-light: #4caf80;
      --bg: #f5f7fa;
      --white: #ffffff;
      --text: #1a2332;
      --muted: #7b8fa6;
      --border: #e4e9f0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-top: 56px;
    }

    /* ── Navbar ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .nav-brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .nav-logo  { width: 30px; height: 30px; border-radius: 6px; overflow: hidden; }
    .nav-logo img { width: 100%; height: 100%; object-fit: contain; }
    .nav-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .nav-title span { color: var(--green); }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .admin-badge {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--green);
      background: #e8f5e9;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .toggle-wrap { display: flex; align-items: center; gap: 7px; cursor: pointer; }
    .toggle-label { font-size: 13px; font-weight: 500; color: var(--muted); }
    .toggle-switch {
      width: 38px; height: 21px;
      background: #e2e8f0;
      border-radius: 20px; position: relative;
      transition: background 0.25s; cursor: pointer;
    }
    .toggle-switch.on { background: var(--green); }
    .toggle-knob {
      position: absolute; top: 3px; left: 3px;
      width: 15px; height: 15px;
      background: #fff; border-radius: 50%;
      transition: left 0.25s;
    }
    .toggle-switch.on .toggle-knob { left: 20px; }

    .btn-logout {
      padding: 7px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      color: var(--muted); cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-logout:hover { background: var(--border); color: var(--text); }

    /* ── Container ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* ── Page Header ── */
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .page-header p  { font-size: 13.5px; color: var(--muted); }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }

    .stat-box-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }

    .stat-box-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .ic-green  { background: #e8f5e9; }
    .ic-blue   { background: #e3f2fd; }
    .ic-orange { background: #fff3e0; }
    .ic-purple { background: #f3e5f5; }

    .stat-box p  {
      font-size: 11.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted); margin-bottom: 6px;
    }

    .stat-box h2 { font-size: 28px; font-weight: 700; color: var(--text); }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }

    .tab {
      padding: 10px 20px;
      background: transparent; border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px; font-weight: 600;
      color: var(--muted); cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active { color: var(--green); border-bottom-color: var(--green); }
    .tab:hover:not(.active) { color: var(--text); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Tags ── */
    .tag {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .tag-green  { background: #e8f5e9; color: #2e7d52; }
    .tag-blue   { background: #e3f2fd; color: #1565c0; }
    .tag-purple { background: #f3e5f5; color: #6a1b9a; }

    /* ── Table Panel ── */
    .table-panel {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .table-header h2 { font-size: 14px; font-weight: 700; color: var(--text); }

    .search-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 13px;
      font-size: 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none; width: 210px;
      transition: border-color 0.18s;
    }

    .search-box::placeholder { color: #94a3b8; }
    .search-box:focus { border-color: var(--green-light); }

    table { width: 100%; border-collapse: collapse; }

    thead tr { background: var(--bg); border-bottom: 1px solid var(--border); }
    thead th {
      padding: 11px 16px; text-align: left;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted);
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafb; }
    tbody td { padding: 13px 16px; font-size: 13.5px; color: var(--text); vertical-align: middle; }

    .empty-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .empty-msg .icon { font-size: 36px; margin-bottom: 12px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--text);
      color: #fff; padding: 11px 24px;
      border-radius: 10px; font-size: 13px; font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #dc2626; }

    /* ── Visitor Controls ── */
    .vis-controls {
      display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }

    .ctrl-group { display: flex; flex-direction: column; gap: 6px; min-width: 150px; }
    .ctrl-group label {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted);
    }

    .vis-controls input[type="date"],
    .vis-controls select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      font-size: 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none; transition: border-color 0.18s;
      -webkit-appearance: none;
    }

    .vis-controls input[type="date"]:focus,
    .vis-controls select:focus { border-color: var(--green-light); }
    .vis-controls select option { background: #fff; }

    .range-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .range-pill {
      padding: 7px 14px; border-radius: 8px;
      font-size: 12.5px; font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      transition: all 0.18s; font-family: 'DM Sans', sans-serif;
    }
    .range-pill.active { background: var(--green); border-color: var(--green); color: #fff; }
    .range-pill:hover:not(.active) { border-color: var(--green-light); color: var(--green); }

    .vis-divider { width: 1px; height: 36px; background: var(--border); align-self: flex-end; }

    /* ── Visitor Stat Cards ── */
    .vis-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .vis-stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      border-top: 3px solid transparent;
      transition: border-color 0.2s;
    }

    .vis-stat-card.acc-green  { border-top-color: #4caf80; }
    .vis-stat-card.acc-blue   { border-top-color: #42a5f5; }
    .vis-stat-card.acc-purple { border-top-color: #ab47bc; }
    .vis-stat-card.acc-orange { border-top-color: #ffa726; }
    .vis-stat-card.acc-teal   { border-top-color: #26a69a; }
    .vis-stat-card.acc-yellow { border-top-color: #ffca28; }

    .vis-stat-card .card-icon  { font-size: 22px; margin-bottom: 10px; display: block; }
    .vis-stat-card .card-label {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .vis-stat-card .card-value { font-size: 30px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1; }
    .vis-stat-card .card-sub   { font-size: 11.5px; color: var(--muted); }

    /* ── Chart ── */
    .chart-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .chart-card h3 {
      font-size: 13px; font-weight: 700;
      color: var(--muted);
      margin-bottom: 16px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .chart-wrap { position: relative; height: 200px; }

    /* ── Breakdowns ── */
    .vis-breakdowns {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 20px;
    }

    .breakdown-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .bc-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted);
      display: flex; align-items: center; gap: 8px;
      background: var(--bg);
    }

    .bc-icon { font-size: 14px; }
    .breakdown-list { padding: 6px 0; }

    .bd-row {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 18px; transition: background 0.15s;
    }
    .bd-row:hover { background: #f8fafb; }
    .bd-label { flex: 1; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bd-bar-wrap { flex: 2; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .bd-bar { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .bd-count { font-size: 13px; font-weight: 700; color: var(--muted); min-width: 28px; text-align: right; }

    /* ── Loading ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .vis-loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .vis-loading .spin {
      width: 30px; height: 30px;
      border: 2.5px solid var(--border);
      border-top-color: var(--green-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    .no-data-msg { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
    .no-data-msg .nd-icon { font-size: 32px; margin-bottom: 10px; }

    @media (max-width: 720px) { .vis-breakdowns { grid-template-columns: 1fr; } }
    @media (max-width: 640px) {
      .navbar { padding: 0 16px; }
      .container { padding: 20px 16px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .vis-controls { flex-direction: column; align-items: stretch; }
      .vis-divider { display: none; }
      table { font-size: 12px; }
      thead th, tbody td { padding: 10px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="#">
    <div class="nav-logo"><img src="https://neu.edu.ph/main/img/neu.png" alt="NEU" /></div>
    <span class="nav-title">NEU <span>Library</span></span>
  </a>
  <div class="nav-right">
    <span class="admin-badge">Admin</span>
    <label class="toggle-wrap" title="Toggle User View">
      <span class="toggle-label">User View</span>
      <div class="toggle-switch" id="user-view-toggle" onclick="toggleUserView(this)">
        <div class="toggle-knob"></div>
      </div>
    </label>
    <button class="btn-logout" onclick="handleLogout()">Log Out</button>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <h1>Admin Dashboard</h1>
    <p>Manage registered users and monitor library visitor statistics.</p>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-box-top">
        <div class="stat-box-icon ic-green">👥</div>
      </div>
      <p>Total Users</p>
      <h2 id="stat-users">—</h2>
    </div>
    <div class="stat-box">
      <div class="stat-box-top">
        <div class="stat-box-icon ic-blue">📅</div>
      </div>
      <p>Today's Visitors</p>
      <h2 id="stat-today">—</h2>
    </div>
    <div class="stat-box">
      <div class="stat-box-top">
        <div class="stat-box-icon ic-orange">📊</div>
      </div>
      <p>This Week</p>
      <h2 id="stat-week">—</h2>
    </div>
    <div class="stat-box">
      <div class="stat-box-top">
        <div class="stat-box-icon ic-purple">📈</div>
      </div>
      <p>This Month</p>
      <h2 id="stat-month">—</h2>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('users')">👥 Registered Users</button>
    <button class="tab"        onclick="switchTab('visitors')">📊 Visitor Statistics</button>
  </div>

  <!-- USERS TAB -->
  <div class="tab-content active" id="tab-users">
    <div class="table-panel">
      <div class="table-header">
        <h2>Registered Users</h2>
        <input class="search-box" type="text" id="search-users" placeholder="Search name or college…" oninput="filterUsers()" />
      </div>
      <div id="users-list"><div class="empty-msg"><div class="icon">👥</div>Loading users…</div></div>
    </div>
  </div>

  <!-- VISITOR STATS TAB -->
  <div class="tab-content" id="tab-visitors">

    <div class="vis-controls">
      <div class="ctrl-group">
        <label>Quick Range</label>
        <div class="range-pills">
          <button class="range-pill active" data-range="today"  onclick="setRange('today')">Today</button>
          <button class="range-pill"        data-range="week"   onclick="setRange('week')">This Week</button>
          <button class="range-pill"        data-range="month"  onclick="setRange('month')">This Month</button>
          <button class="range-pill"        data-range="custom" onclick="setRange('custom')">Custom</button>
        </div>
      </div>
      <div class="vis-divider"></div>
      <div class="ctrl-group" id="grp-from" style="display:none">
        <label>From</label>
        <input type="date" id="vis-from" onchange="loadAndRender()" />
      </div>
      <div class="ctrl-group" id="grp-to" style="display:none">
        <label>To</label>
        <input type="date" id="vis-to" onchange="loadAndRender()" />
      </div>
      <div class="vis-divider"></div>
      <div class="ctrl-group">
        <label>Reason for Visit</label>
        <select id="vis-reason" onchange="applyFilters()">
          <option value="">All Reasons</option>
          <option>Book Borrowing</option>
          <option>Reading / Study</option>
          <option>Research</option>
          <option>Internet Use</option>
          <option>Thesis / Dissertation</option>
          <option>Other</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>College / Dept.</label>
        <select id="vis-college" onchange="applyFilters()">
          <option value="">All Colleges</option>
          <option value="CAS">CAS</option>
          <option value="CBE">CBE</option>
          <option value="CEd">CEd</option>
          <option value="CEng">CEng</option>
          <option value="CITE">CITE</option>
          <option value="CN">CN</option>
          <option value="CPT">CPT</option>
          <option value="SHS">SHS</option>
          <option value="Staff / Admin">Staff / Admin</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Visitor Type</label>
        <select id="vis-emptype" onchange="applyFilters()">
          <option value="">All Types</option>
          <option value="employee">Employees Only</option>
          <option value="student">Students Only</option>
        </select>
      </div>
      <div class="ctrl-group" id="grp-reset" style="display:none; flex-direction:column; gap:6px;">
        <label>&nbsp;</label>
        <button onclick="resetAll()" style="padding:8px 18px; background:#fee2e2; border:1px solid #fca5a5; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:12.5px; font-weight:600; color:#dc2626; cursor:pointer;">✕ Reset All</button>
      </div>
    </div>

    <div class="vis-stats" id="vis-stat-cards">
      <div class="vis-loading"><div class="spin"></div>Loading visitor data…</div>
    </div>

    <div class="chart-card" id="vis-chart-card" style="display:none">
      <h3>📈 Daily Visitor Trend</h3>
      <div class="chart-wrap"><canvas id="vis-chart"></canvas></div>
    </div>

    <div class="vis-breakdowns" id="vis-breakdowns"></div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  var SUPA_URL = 'https://fqdlpskyavrsoyjbvksi.supabase.co';
  var SUPA_KEY = 'sb_publishable_nAdhpbEdXTnEqaRv2JAzvg_5k_KUPGP';
  var db = supabase.createClient(SUPA_URL, SUPA_KEY);

  var usersList   = [];
  var visitorRaw  = [];
  var visitorFilt = [];
  var visChart    = null;
  var currentRange = 'today';
  var visInited   = false;
  var toastTimer;

  var BAR_COLORS = ['#4caf80','#42a5f5','#ab47bc','#ffa726','#26a69a','#ffca28','#ef5350','#66bb6a','#ec407a','#78909c'];

  function toggleUserView(el) {
    el.classList.toggle('on');
    if (el.classList.contains('on')) {
      setTimeout(function() { window.location.href = 'homepage.html'; }, 300);
    }
  }

  function toast(msg, isErr) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    isErr ? t.classList.add('error') : t.classList.remove('error');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3500);
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(function(t,i){
      t.classList.toggle('active', (name==='users'&&i===0)||(name==='visitors'&&i===1));
    });
    document.getElementById('tab-users').classList.toggle('active',    name==='users');
    document.getElementById('tab-visitors').classList.toggle('active', name==='visitors');
    if (name==='visitors' && !visInited) { visInited=true; loadAndRender(); }
  }

  async function handleLogout() {
    await db.auth.signOut();
    window.location.href = 'index.html';
  }

  async function fetchUsers() {
    var res = await db.from('profiles').select('*').order('full_name',{ascending:true});
    if (res.error) { toast('Failed to load users.', true); return; }
    usersList = res.data || [];
    showUsers(usersList);
    document.getElementById('stat-users').textContent = usersList.length;
  }

  function showUsers(users) {
    var el = document.getElementById('users-list');
    if (!users.length) { el.innerHTML = '<div class="empty-msg"><div class="icon">👥</div>No users found.</div>'; return; }
    var rows = users.map(function(u){
      var cls = u.role==='faculty' ? 'tag-purple' : u.role==='admin' ? 'tag-green' : 'tag-blue';
      return '<tr><td>'+(u.full_name||'—')+'</td><td><span class="tag '+cls+'">'+(u.role||'—')+'</span></td><td>'+(u.college||'—')+'</td></tr>';
    }).join('');
    el.innerHTML = '<table><thead><tr><th>Full Name</th><th>Role</th><th>College / Dept.</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  function filterUsers() {
    var q = document.getElementById('search-users').value.toLowerCase();
    showUsers(usersList.filter(function(u){
      return (u.full_name||'').toLowerCase().includes(q)||(u.college||'').toLowerCase().includes(q);
    }));
  }

  async function fetchVisitorCounts() {
    var now = new Date();
    var todayStart = new Date(now); todayStart.setHours(0,0,0,0);
    var weekStart  = new Date(now); weekStart.setDate(now.getDate()-now.getDay()); weekStart.setHours(0,0,0,0);
    var monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    var results = await Promise.all([
      db.from('visitor_logs').select('id',{count:'exact',head:true}).gte('visited_at',todayStart.toISOString()),
      db.from('visitor_logs').select('id',{count:'exact',head:true}).gte('visited_at',weekStart.toISOString()),
      db.from('visitor_logs').select('id',{count:'exact',head:true}).gte('visited_at',monthStart.toISOString()),
    ]);
    document.getElementById('stat-today').textContent = results[0].count ?? '—';
    document.getElementById('stat-week').textContent  = results[1].count ?? '—';
    document.getElementById('stat-month').textContent = results[2].count ?? '—';
  }

  function dateStr(d) { return d.toISOString().slice(0,10); }

  function getRangeDates() {
    var now = new Date(); var from, to;
    to = new Date(now); to.setHours(23,59,59,999);
    if (currentRange==='today') {
      from = new Date(now); from.setHours(0,0,0,0);
    } else if (currentRange==='week') {
      from = new Date(now); from.setDate(now.getDate()-now.getDay()); from.setHours(0,0,0,0);
    } else if (currentRange==='month') {
      from = new Date(now.getFullYear(),now.getMonth(),1,0,0,0,0);
    } else {
      var fv=document.getElementById('vis-from').value;
      var tv=document.getElementById('vis-to').value;
      from = fv ? new Date(fv+'T00:00:00') : new Date(now.getFullYear(),now.getMonth(),1);
      to   = tv ? new Date(tv+'T23:59:59') : new Date();
    }
    return { from:from, to:to };
  }

  function setRange(r) {
    currentRange = r;
    document.querySelectorAll('.range-pill').forEach(function(p){ p.classList.toggle('active', p.dataset.range===r); });
    var isCustom = r==='custom';
    document.getElementById('grp-from').style.display  = isCustom?'flex':'none';
    document.getElementById('grp-to').style.display    = isCustom?'flex':'none';
    document.getElementById('grp-reset').style.display = isCustom?'flex':'none';
    if (!isCustom) loadAndRender();
  }

  async function loadAndRender() {
    document.getElementById('vis-stat-cards').innerHTML = '<div class="vis-loading"><div class="spin"></div>Loading visitor data…</div>';
    document.getElementById('vis-breakdowns').innerHTML = '';
    document.getElementById('vis-chart-card').style.display = 'none';
    var dates = getRangeDates();
    var res = await db.from('visitor_logs').select('id,visited_at,reason,college,is_employee').gte('visited_at',dates.from.toISOString()).lte('visited_at',dates.to.toISOString()).order('visited_at',{ascending:true});
    if (res.error) { toast('Failed to load visitor data.', true); return; }
    visitorRaw = res.data || [];
    applyFilters();
  }

  function applyFilters() {
    var reason  = document.getElementById('vis-reason').value;
    var college = document.getElementById('vis-college').value;
    var emptype = document.getElementById('vis-emptype').value;
    visitorFilt = visitorRaw.filter(function(r){
      if (reason  && r.reason  !== reason)  return false;
      if (college && r.college !== college) return false;
      if (emptype==='employee' && !r.is_employee) return false;
      if (emptype==='student'  &&  r.is_employee) return false;
      return true;
    });
    renderStatCards(visitorFilt);
    renderChart(visitorFilt);
    renderBreakdowns(visitorFilt);
  }

  function renderStatCards(data) {
    var total=data.length, employees=data.filter(function(r){return r.is_employee;}).length, students=total-employees;
    var hmap={};
    data.forEach(function(r){ var h=new Date(r.visited_at).getHours(); hmap[h]=(hmap[h]||0)+1; });
    var peakHour='-',peakVal=0;
    Object.keys(hmap).forEach(function(h){ if(hmap[h]>peakVal){peakVal=hmap[h];peakHour=h;} });
    if (peakHour!=='-') { var ph=parseInt(peakHour); peakHour=(ph%12||12)+(ph<12?'am':'pm'); }
    var days={};
    data.forEach(function(r){ days[r.visited_at.slice(0,10)]=1; });
    var avg=(total/(Object.keys(days).length||1)).toFixed(1);
    var rc=countBy(data,'reason'), topR=topKey(rc)||'—';
    var cards=[
      {icon:'👥',label:'Total Visitors',value:total,   sub:'in selected period',   acc:'acc-green'},
      {icon:'🎓',label:'Students',      value:students, sub:'non-employee visitors',acc:'acc-blue'},
      {icon:'👔',label:'Employees',     value:employees,sub:'faculty & staff',      acc:'acc-purple'},
      {icon:'⏰',label:'Peak Hour',     value:peakHour, sub:'highest traffic',      acc:'acc-orange'},
      {icon:'📈',label:'Daily Avg',     value:avg,      sub:'visitors per day',     acc:'acc-teal'},
      {icon:'📌',label:'Top Reason',    value:topR,     sub:total?(rc[topR]+' visits'):'',acc:'acc-yellow'},
    ];
    document.getElementById('vis-stat-cards').innerHTML=cards.map(function(c){
      return '<div class="vis-stat-card '+c.acc+'"><span class="card-icon">'+c.icon+'</span><div class="card-label">'+c.label+'</div><div class="card-value">'+c.value+'</div><div class="card-sub">'+c.sub+'</div></div>';
    }).join('');
  }

  function renderChart(data) {
    var card=document.getElementById('vis-chart-card');
    if (!data.length) { card.style.display='none'; return; }
    card.style.display='block';
    var dates=getRangeDates(), dayMap={};
    data.forEach(function(r){ var d=r.visited_at.slice(0,10); dayMap[d]=(dayMap[d]||0)+1; });
    var labels=[],counts=[];
    var cur=new Date(dates.from); cur.setHours(0,0,0,0);
    while (cur<=dates.to) { var key=dateStr(cur); labels.push(key.slice(5)); counts.push(dayMap[key]||0); cur.setDate(cur.getDate()+1); }
    if (labels.length<=1) {
      var hmap={}; for(var h=0;h<24;h++) hmap[h]=0;
      data.forEach(function(r){ hmap[new Date(r.visited_at).getHours()]++; });
      labels=Object.keys(hmap).map(function(h){ var p=parseInt(h); return (p%12||12)+(p<12?'am':'pm'); });
      counts=Object.values(hmap);
    }
    var ctx=document.getElementById('vis-chart').getContext('2d');
    if (visChart) visChart.destroy();
    visChart=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:'Visitors',data:counts,backgroundColor:'#e8f5e9',borderColor:'#4caf80',borderWidth:1.5,borderRadius:6,hoverBackgroundColor:'#c8e6c9'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a2332',borderColor:'#e4e9f0',borderWidth:1,titleColor:'#fff',bodyColor:'rgba(255,255,255,0.7)',padding:10}},scales:{x:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#f0f4f8'}},y:{ticks:{color:'#94a3b8',font:{size:11},stepSize:1},grid:{color:'#f0f4f8'},beginAtZero:true}}}});
  }

  function renderBreakdowns(data) {
    var el=document.getElementById('vis-breakdowns');
    if (!data.length) { el.innerHTML='<div class="no-data-msg" style="grid-column:1/-1"><div class="nd-icon">🔍</div>No visitor data for this period.</div>'; return; }
    el.innerHTML=buildBreakdown('📋','Reason for Visit',countBy(data,'reason'))+buildBreakdown('🏫','College / Department',countBy(data,'college'));
  }

  function buildBreakdown(icon,title,counts) {
    var entries=Object.entries(counts).sort(function(a,b){return b[1]-a[1];}), max=entries.length?entries[0][1]:1;
    if (!entries.length) return '<div class="breakdown-card"><div class="bc-head"><span class="bc-icon">'+icon+'</span>'+title+'</div><div class="breakdown-list"><div class="no-data-msg" style="padding:20px">No data.</div></div></div>';
    var rows=entries.map(function(e,i){ var pct=Math.round((e[1]/max)*100); return '<div class="bd-row"><div class="bd-label">'+(e[0]||'Unknown')+'</div><div class="bd-bar-wrap"><div class="bd-bar" style="width:'+pct+'%;background:'+BAR_COLORS[i%BAR_COLORS.length]+'"></div></div><div class="bd-count">'+e[1]+'</div></div>'; }).join('');
    return '<div class="breakdown-card"><div class="bc-head"><span class="bc-icon">'+icon+'</span>'+title+'</div><div class="breakdown-list">'+rows+'</div></div>';
  }

  function resetFilters() {
    document.getElementById('vis-reason').value  = '';
    document.getElementById('vis-college').value = '';
    document.getElementById('vis-emptype').value = '';
    applyFilters();
  }

  function resetAll() {
    document.getElementById('vis-from').value   = '';
    document.getElementById('vis-to').value     = '';
    document.getElementById('vis-reason').value  = '';
    document.getElementById('vis-college').value = '';
    document.getElementById('vis-emptype').value = '';
    loadAndRender();
  }

  function resetCustom() {
    document.getElementById('vis-from').value = '';
    document.getElementById('vis-to').value = '';
    loadAndRender();
  }

  function countBy(arr,key){ var out={}; arr.forEach(function(r){ var v=r[key]||'Unknown'; out[v]=(out[v]||0)+1; }); return out; }
  function topKey(obj){ var best=null,bv=0; Object.keys(obj).forEach(function(k){ if(obj[k]>bv){bv=obj[k];best=k;} }); return best; }

  fetchUsers();
  fetchVisitorCounts();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEU Library - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #2e7d52;
      --green-dark: #256645;
      --green-light: #4caf80;
      --bg-main: #081525;
      --bg-card: #0e1f33;
      --border-color: rgba(255, 255, 255, 0.08);
      --muted: rgba(255, 255, 255, 0.45);
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.12);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg-main);
      color: #fff;
      min-height: 100vh;
      padding-top: 62px;
    }

    /* navbar */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      background: rgba(8, 21, 37, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-color);
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      overflow: hidden;
    }

    .nav-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .nav-title {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: #fff;
    }

    .nav-title span {
      color: var(--green-light);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--green-light);
      background: rgba(76, 175, 128, 0.12);
      border: 1px solid rgba(76, 175, 128, 0.25);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .btn-outline {
      padding: 8px 20px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.65);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-outline:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: #fff;
    }

    /* main content */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    .page-title {
      margin-bottom: 32px;
    }

    .page-title h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: #fff;
      margin-bottom: 4px;
    }

    .page-title h1 em {
      font-style: italic;
      color: var(--green-light);
    }

    .page-title p {
      font-size: 13.5px;
      color: var(--muted);
    }

    /* stats */
    .stats-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .stat-box {
      flex: 1;
      min-width: 140px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 18px 20px;
    }

    .stat-box p {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-box h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: #fff;
    }

    /* tabs */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 32px;
    }

    .tab {
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active {
      color: #fff;
      border-bottom-color: var(--green-light);
    }

    .tab:hover:not(.active) {
      color: rgba(255, 255, 255, 0.7);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* form section */
    .section-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .form-row .col-full {
      grid-column: 1 / -1;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .input-group input,
    .input-group select,
    .input-group textarea {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 7px;
      padding: 10px 13px;
      font-size: 13.5px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      width: 100%;
      transition: border-color 0.18s;
      -webkit-appearance: none;
    }

    .input-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .input-group input::placeholder,
    .input-group textarea::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus {
      border-color: var(--green-light);
    }

    .input-group select option {
      background: #0e1f33;
    }

    .form-footer {
      display: flex;
      justify-content: flex-end;
    }

    .btn-green {
      padding: 10px 28px;
      background: var(--green);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background 0.18s, opacity 0.18s;
    }

    .btn-green:hover {
      background: var(--green-dark);
    }

    .btn-green:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-gray {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s;
    }

    .btn-gray:hover {
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    /* table panel */
    .table-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .table-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .search-box {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 7px;
      padding: 8px 13px;
      font-size: 13px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      width: 220px;
      transition: border-color 0.18s;
    }

    .search-box::placeholder {
      color: rgba(255, 255, 255, 0.22);
    }

    .search-box:focus {
      border-color: var(--green-light);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      border-bottom: 1px solid var(--border-color);
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
    }

    tbody tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      transition: background 0.15s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    tbody td {
      padding: 14px 16px;
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.85);
      vertical-align: middle;
    }

    .cover-img {
      width: 36px;
      height: 48px;
      border-radius: 4px;
      object-fit: cover;
      display: block;
    }

    .cover-placeholder {
      width: 36px;
      height: 48px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .tag-green {
      background: rgba(76, 175, 128, 0.12);
      border: 1px solid rgba(76, 175, 128, 0.22);
      color: var(--green-light);
    }

    .tag-orange {
      background: rgba(255, 152, 0, 0.12);
      border: 1px solid rgba(255, 152, 0, 0.22);
      color: #ffb74d;
    }

    .tag-red {
      background: rgba(192, 57, 43, 0.12);
      border: 1px solid rgba(192, 57, 43, 0.22);
      color: #ef9a9a;
    }

    .tag-blue {
      background: rgba(66, 165, 245, 0.12);
      border: 1px solid rgba(66, 165, 245, 0.22);
      color: #90caf9;
    }

    .tag-purple {
      background: rgba(171, 71, 188, 0.12);
      border: 1px solid rgba(171, 71, 188, 0.22);
      color: #ce93d8;
    }

    .action-group {
      display: flex;
      gap: 8px;
    }

    .btn-edit {
      padding: 6px 14px;
      border-radius: 6px;
      background: rgba(66, 165, 245, 0.1);
      border: 1px solid rgba(66, 165, 245, 0.2);
      font-size: 12px;
      font-weight: 500;
      color: #90caf9;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }

    .btn-edit:hover {
      background: rgba(66, 165, 245, 0.2);
    }

    .btn-del {
      padding: 6px 14px;
      border-radius: 6px;
      background: rgba(192, 57, 43, 0.1);
      border: 1px solid rgba(192, 57, 43, 0.2);
      font-size: 12px;
      font-weight: 500;
      color: #ef9a9a;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }

    .btn-del:hover {
      background: rgba(192, 57, 43, 0.2);
    }

    .empty-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .empty-msg .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* modal */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    .modal-bg.open {
      display: flex;
    }

    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 28px;
      width: min(500px, 92vw);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-box h3 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #1b3a28;
      border: 1px solid var(--green);
      color: #fff;
      padding: 11px 24px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: #3a1b1b;
      border-color: #c0392b;
    }

    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
      .form-row .col-full { grid-column: 1; }
      .navbar { padding: 0 16px; }
      .container { padding: 24px 16px; }
      .stats-row { flex-direction: column; }
      table { font-size: 12px; }
      thead th, tbody td { padding: 10px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="#">
      <div class="nav-logo">
        <img src="https://neu.edu.ph/main/img/neu.png" alt="NEU Logo" />
      </div>
      <span class="nav-title">NEU <span>Library</span></span>
    </a>
    <div class="nav-right">
      <span class="admin-tag">Admin</span>
      <button class="btn-outline" onclick="handleLogout()">Log Out</button>
    </div>
  </nav>

  <div class="container">

    <div class="page-title">
      <h1>Admin <em>Dashboard</em></h1>
      <p>Manage books and view registered users.</p>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <p>Total Books</p>
        <h2 id="stat-total">—</h2>
      </div>
      <div class="stat-box">
        <p>Available</p>
        <h2 id="stat-available">—</h2>
      </div>
      <div class="stat-box">
        <p>Low Stock</p>
        <h2 id="stat-low">—</h2>
      </div>
      <div class="stat-box">
        <p>Out of Stock</p>
        <h2 id="stat-out">—</h2>
      </div>
      <div class="stat-box">
        <p>Total Users</p>
        <h2 id="stat-users">—</h2>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('books')">📚 Manage Books</button>
      <button class="tab" onclick="switchTab('users')">👥 Registered Users</button>
    </div>

    <!-- Books Tab -->
    <div class="tab-content active" id="tab-books">

      <div class="section-label">Add New Book</div>

      <div class="form-card">
        <div class="form-row">
          <div class="input-group">
            <label>Title</label>
            <input type="text" id="add-title" placeholder="Book title" />
          </div>
          <div class="input-group">
            <label>Author</label>
            <input type="text" id="add-author" placeholder="Author name" />
          </div>
          <div class="input-group">
            <label>Category</label>
            <select id="add-category">
              <option value="" disabled selected>Select category</option>
              <option>Fiction</option>
              <option>Non-Fiction</option>
              <option>Science & Technology</option>
              <option>History</option>
              <option>Mathematics</option>
              <option>Engineering</option>
              <option>Medicine & Health</option>
              <option>Law</option>
              <option>Business & Economics</option>
              <option>Education</option>
              <option>Arts & Music</option>
              <option>Reference</option>
              <option>Other</option>
            </select>
          </div>
          <div class="input-group">
            <label>Available Copies</label>
            <input type="number" id="add-copies" placeholder="e.g. 5" min="0" />
          </div>
          <div class="input-group col-full">
            <label>Cover Image URL</label>
            <input type="url" id="add-cover" placeholder="https://... (optional)" />
          </div>
          <div class="input-group col-full">
            <label>Description</label>
            <textarea id="add-desc" placeholder="Short description of the book..."></textarea>
          </div>
        </div>
        <div class="form-footer">
          <button class="btn-green" id="add-btn" onclick="handleAddBook()">Add Book</button>
        </div>
      </div>

      <div class="table-panel">
        <div class="table-header">
          <h2>All Books</h2>
          <input class="search-box" type="text" id="search-books" placeholder="Search title or author…" oninput="filterBooks()" />
        </div>
        <div id="books-list">
          <div class="empty-msg"><div class="icon">📚</div>Loading books...</div>
        </div>
      </div>

    </div>

    <!-- Users Tab -->
    <div class="tab-content" id="tab-users">
      <div class="table-panel">
        <div class="table-header">
          <h2>Registered Users</h2>
          <input class="search-box" type="text" id="search-users" placeholder="Search name or college…" oninput="filterUsers()" />
        </div>
        <div id="users-list">
          <div class="empty-msg"><div class="icon">👥</div>Loading users...</div>
        </div>
      </div>
    </div>

  </div>

  <!-- Edit Modal -->
  <div class="modal-bg" id="edit-modal">
    <div class="modal-box">
      <h3>Edit Book</h3>
      <input type="hidden" id="edit-id" />
      <div class="form-row">
        <div class="input-group">
          <label>Title</label>
          <input type="text" id="edit-title" placeholder="Book title" />
        </div>
        <div class="input-group">
          <label>Author</label>
          <input type="text" id="edit-author" placeholder="Author name" />
        </div>
        <div class="input-group">
          <label>Category</label>
          <select id="edit-category">
            <option value="" disabled>Select category</option>
            <option>Fiction</option>
            <option>Non-Fiction</option>
            <option>Science & Technology</option>
            <option>History</option>
            <option>Mathematics</option>
            <option>Engineering</option>
            <option>Medicine & Health</option>
            <option>Law</option>
            <option>Business & Economics</option>
            <option>Education</option>
            <option>Arts & Music</option>
            <option>Reference</option>
            <option>Other</option>
          </select>
        </div>
        <div class="input-group">
          <label>Available Copies</label>
          <input type="number" id="edit-copies" min="0" />
        </div>
        <div class="input-group col-full">
          <label>Cover Image URL</label>
          <input type="url" id="edit-cover" placeholder="https://..." />
        </div>
        <div class="input-group col-full">
          <label>Description</label>
          <textarea id="edit-desc"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-gray" onclick="closeModal()">Cancel</button>
        <button class="btn-green" id="save-btn" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var SUPA_URL = 'https://fqdlpskyavrsoyjbvksi.supabase.co';
    var SUPA_KEY = 'sb_publishable_nAdhpbEdXTnEqaRv2JAzvg_5k_KUPGP';
    var db = supabase.createClient(SUPA_URL, SUPA_KEY);

    var booksList = [];
    var usersList = [];
    var toastTimeout;

    function toast(msg, isErr) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      if (isErr) {
        t.classList.add('error');
      } else {
        t.classList.remove('error');
      }
      t.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(function() {
        t.classList.remove('show');
      }, 3500);
    }

    function switchTab(name) {
      var tabs = document.querySelectorAll('.tab');
      var contents = document.querySelectorAll('.tab-content');
      tabs[0].classList.toggle('active', name === 'books');
      tabs[1].classList.toggle('active', name === 'users');
      document.getElementById('tab-books').classList.toggle('active', name === 'books');
      document.getElementById('tab-users').classList.toggle('active', name === 'users');
      if (name === 'users' && usersList.length === 0) {
        fetchUsers();
      }
    }

    async function handleLogout() {
      await db.auth.signOut();
      window.location.href = 'index.html';
    }

    async function fetchBooks() {
      var result = await db.from('books').select('*').order('created_at', { ascending: false });
      if (result.error) {
        toast('Failed to load books.', true);
        return;
      }
      booksList = result.data || [];
      showBooks(booksList);
      updateStats(booksList);
    }

    function updateStats(books) {
      document.getElementById('stat-total').textContent = books.length;
      document.getElementById('stat-available').textContent = books.filter(function(b) { return b.copies > 1; }).length;
      document.getElementById('stat-low').textContent = books.filter(function(b) { return b.copies === 1; }).length;
      document.getElementById('stat-out').textContent = books.filter(function(b) { return b.copies === 0; }).length;
    }

    function showBooks(books) {
      var el = document.getElementById('books-list');
      if (books.length === 0) {
        el.innerHTML = '<div class="empty-msg"><div class="icon">📚</div>No books found.</div>';
        return;
      }

      var rows = '';
      for (var i = 0; i < books.length; i++) {
        var b = books[i];
        var cover = b.cover_image
          ? '<img class="cover-img" src="' + b.cover_image + '" alt="" onerror="this.style.display=\'none\'">'
          : '<div class="cover-placeholder">📖</div>';

        var copyTag = '';
        if (b.copies === 0) {
          copyTag = '<span class="tag tag-red">' + b.copies + ' (Out)</span>';
        } else if (b.copies === 1) {
          copyTag = '<span class="tag tag-orange">' + b.copies + ' (Low)</span>';
        } else {
          copyTag = '<span class="tag tag-green">' + b.copies + '</span>';
        }

        var safeTitle = b.title.replace(/'/g, "\\'");

        rows += '<tr>';
        rows += '<td>' + cover + '</td>';
        rows += '<td>' + b.title + '</td>';
        rows += '<td>' + b.author + '</td>';
        rows += '<td>' + (b.category || '—') + '</td>';
        rows += '<td>' + copyTag + '</td>';
        rows += '<td><div class="action-group">';
        rows += '<button class="btn-edit" onclick="openEdit(\'' + b.id + '\')">Edit</button>';
        rows += '<button class="btn-del" onclick="deleteBook(\'' + b.id + '\',\'' + safeTitle + '\')">Delete</button>';
        rows += '</div></td>';
        rows += '</tr>';
      }

      el.innerHTML = '<table><thead><tr><th>Cover</th><th>Title</th><th>Author</th><th>Category</th><th>Copies</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table>';
    }

    function filterBooks() {
      var q = document.getElementById('search-books').value.toLowerCase();
      var filtered = booksList.filter(function(b) {
        return b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q);
      });
      showBooks(filtered);
    }

    async function fetchUsers() {
      var result = await db.from('profiles').select('*').order('full_name', { ascending: true });
      if (result.error) {
        toast('Failed to load users.', true);
        return;
      }
      usersList = result.data || [];
      showUsers(usersList);
      document.getElementById('stat-users').textContent = usersList.length;
    }

    function showUsers(users) {
      var el = document.getElementById('users-list');
      if (users.length === 0) {
        el.innerHTML = '<div class="empty-msg"><div class="icon">👥</div>No users found.</div>';
        return;
      }

      var rows = '';
      for (var i = 0; i < users.length; i++) {
        var u = users[i];
        var roleClass = u.role === 'faculty' ? 'tag-purple' : u.role === 'admin' ? 'tag-green' : 'tag-blue';
        rows += '<tr>';
        rows += '<td>' + (u.full_name || '—') + '</td>';
        rows += '<td><span class="tag ' + roleClass + '">' + (u.role || '—') + '</span></td>';
        rows += '<td>' + (u.college || '—') + '</td>';
        rows += '</tr>';
      }

      el.innerHTML = '<table><thead><tr><th>Full Name</th><th>Role</th><th>College / Dept.</th></tr></thead><tbody>' + rows + '</tbody></table>';
    }

    function filterUsers() {
      var q = document.getElementById('search-users').value.toLowerCase();
      var filtered = usersList.filter(function(u) {
        return (u.full_name || '').toLowerCase().includes(q) || (u.college || '').toLowerCase().includes(q);
      });
      showUsers(filtered);
    }

    async function handleAddBook() {
      var title    = document.getElementById('add-title').value.trim();
      var author   = document.getElementById('add-author').value.trim();
      var category = document.getElementById('add-category').value;
      var copies   = parseInt(document.getElementById('add-copies').value) || 0;
      var cover    = document.getElementById('add-cover').value.trim();
      var desc     = document.getElementById('add-desc').value.trim();

      if (!title || !author) {
        toast('Title and Author are required.', true);
        return;
      }

      var btn = document.getElementById('add-btn');
      btn.disabled = true;
      btn.textContent = 'Adding…';

      var result = await db.from('books').insert({
        title: title,
        author: author,
        category: category || null,
        copies: copies,
        cover_image: cover || null,
        description: desc || null
      });

      btn.disabled = false;
      btn.textContent = 'Add Book';

      if (result.error) {
        toast(result.error.message, true);
        return;
      }

      document.getElementById('add-title').value = '';
      document.getElementById('add-author').value = '';
      document.getElementById('add-copies').value = '';
      document.getElementById('add-cover').value = '';
      document.getElementById('add-desc').value = '';
      document.getElementById('add-category').selectedIndex = 0;

      toast('Book added successfully!');
      fetchBooks();
    }

    async function deleteBook(id, title) {
      if (!confirm('Delete "' + title + '"?')) return;
      var result = await db.from('books').delete().eq('id', id);
      if (result.error) {
        toast(result.error.message, true);
        return;
      }
      toast('Book deleted.');
      fetchBooks();
    }

    function openEdit(id) {
      var book = null;
      for (var i = 0; i < booksList.length; i++) {
        if (booksList[i].id === id) {
          book = booksList[i];
          break;
        }
      }
      if (!book) return;

      document.getElementById('edit-id').value       = book.id;
      document.getElementById('edit-title').value    = book.title;
      document.getElementById('edit-author').value   = book.author;
      document.getElementById('edit-category').value = book.category || '';
      document.getElementById('edit-copies').value   = book.copies;
      document.getElementById('edit-cover').value    = book.cover_image || '';
      document.getElementById('edit-desc').value     = book.description || '';

      document.getElementById('edit-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('edit-modal').classList.remove('open');
    }

    async function saveEdit() {
      var id       = document.getElementById('edit-id').value;
      var title    = document.getElementById('edit-title').value.trim();
      var author   = document.getElementById('edit-author').value.trim();
      var category = document.getElementById('edit-category').value;
      var copies   = parseInt(document.getElementById('edit-copies').value) || 0;
      var cover    = document.getElementById('edit-cover').value.trim();
      var desc     = document.getElementById('edit-desc').value.trim();

      if (!title || !author) {
        toast('Title and Author are required.', true);
        return;
      }

      var btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      var result = await db.from('books').update({
        title: title,
        author: author,
        category: category || null,
        copies: copies,
        cover_image: cover || null,
        description: desc || null
      }).eq('id', id);

      btn.disabled = false;
      btn.textContent = 'Save Changes';

      if (result.error) {
        toast(result.error.message, true);
        return;
      }

      closeModal();
      toast('Book updated successfully!');
      fetchBooks();
    }

    document.getElementById('edit-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    fetchBooks();
  </script>

</body>
</html>

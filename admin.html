<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEU Library - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2e7d52;
      --green-dark: #256645;
      --green-light: #4caf80;
      --bg-main: #081525;
      --bg-card: #0e1f33;
      --border-color: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.45);
      --input-bg: rgba(255,255,255,0.06);
      --input-border: rgba(255,255,255,0.12);
    }

    body { font-family: 'DM Sans', sans-serif; background-color: var(--bg-main); color: #fff; min-height: 100vh; padding-top: 62px; }

    .navbar { position: fixed; top: 0; left: 0; right: 0; height: 62px; display: flex; align-items: center; justify-content: space-between; padding: 0 36px; background: rgba(8,21,37,0.9); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border-color); z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo  { width: 32px; height: 32px; border-radius: 7px; overflow: hidden; }
    .nav-logo img { width: 100%; height: 100%; object-fit: contain; }
    .nav-title { font-family: 'DM Serif Display', serif; font-size: 15px; color: #fff; }
    .nav-title span { color: var(--green-light); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .admin-tag { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--green-light); background: rgba(76,175,128,0.12); border: 1px solid rgba(76,175,128,0.25); padding: 4px 10px; border-radius: 20px; }
    .btn-outline { padding: 8px 20px; background: transparent; border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.65); cursor: pointer; transition: border-color .2s, color .2s; }
    .btn-outline:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

    .container { max-width: 1100px; margin: 0 auto; padding: 36px 24px; }
    .page-title { margin-bottom: 32px; }
    .page-title h1 { font-family: 'DM Serif Display', serif; font-size: 32px; color: #fff; margin-bottom: 4px; }
    .page-title h1 em { font-style: italic; color: var(--green-light); }
    .page-title p { font-size: 13.5px; color: var(--muted); }

    .stats-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
    .stat-box { flex: 1; min-width: 140px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; padding: 18px 20px; }
    .stat-box p  { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-box h2 { font-family: 'DM Serif Display', serif; font-size: 28px; color: #fff; }

    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border-color); margin-bottom: 32px; }
    .tab { padding: 10px 20px; background: transparent; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500; color: var(--muted); cursor: pointer; transition: color .2s, border-color .2s; }
    .tab.active { color: #fff; border-bottom-color: var(--green-light); }
    .tab:hover:not(.active) { color: rgba(255,255,255,0.7); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .tag-green  { background: rgba(76,175,128,0.12); border: 1px solid rgba(76,175,128,0.22); color: var(--green-light); }
    .tag-blue   { background: rgba(66,165,245,0.12); border: 1px solid rgba(66,165,245,0.22); color: #90caf9; }
    .tag-purple { background: rgba(171,71,188,0.12); border: 1px solid rgba(171,71,188,0.22); color: #ce93d8; }

    .table-panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border-color); }
    .table-header h2 { font-size: 15px; font-weight: 600; color: #fff; }
    .search-box { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 7px; padding: 8px 13px; font-size: 13px; color: #fff; font-family: 'DM Sans', sans-serif; outline: none; width: 220px; transition: border-color .18s; }
    .search-box::placeholder { color: rgba(255,255,255,0.22); }
    .search-box:focus { border-color: var(--green-light); }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border-color); }
    thead th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody td { padding: 14px 16px; font-size: 13.5px; color: rgba(255,255,255,0.85); vertical-align: middle; }
    .empty-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .empty-msg .icon { font-size: 40px; margin-bottom: 12px; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(70px); background: #1b3a28; border: 1px solid var(--green); color: #fff; padding: 11px 24px; border-radius: 7px; font-size: 13px; font-weight: 500; transition: transform .35s cubic-bezier(.34,1.56,.64,1); z-index: 999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #3a1b1b; border-color: #c0392b; }

    /* ── VISITOR STATS ── */
    .vis-controls { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px 24px; margin-bottom: 28px; }
    .ctrl-group { display: flex; flex-direction: column; gap: 6px; min-width: 150px; }
    .ctrl-group label { font-size: 10.5px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
    .vis-controls input[type="date"],
    .vis-controls select { background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 7px; padding: 9px 12px; font-size: 13px; color: #fff; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .18s; -webkit-appearance: none; color-scheme: dark; }
    .vis-controls input[type="date"]:focus,
    .vis-controls select:focus { border-color: var(--green-light); }
    .vis-controls select option { background: #0e1f33; }

    .range-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .range-pill { padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--muted); cursor: pointer; transition: all .18s; font-family: 'DM Sans', sans-serif; }
    .range-pill.active, .range-pill:hover { background: rgba(76,175,128,0.15); border-color: rgba(76,175,128,0.35); color: var(--green-light); }
    .vis-divider { width: 1px; height: 40px; background: var(--border-color); align-self: flex-end; margin: 0 2px; }

    .vis-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(165px,1fr)); gap: 14px; margin-bottom: 28px; }
    .vis-stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px 22px; position: relative; overflow: hidden; transition: border-color .2s, transform .2s; }
    .vis-stat-card:hover { border-color: rgba(76,175,128,0.2); transform: translateY(-2px); }
    .vis-stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 12px 12px 0 0; }
    .vis-stat-card.acc-green::before  { background: var(--green-light); }
    .vis-stat-card.acc-blue::before   { background: #90caf9; }
    .vis-stat-card.acc-purple::before { background: #ce93d8; }
    .vis-stat-card.acc-orange::before { background: #ffb74d; }
    .vis-stat-card.acc-teal::before   { background: #80cbc4; }
    .vis-stat-card.acc-yellow::before { background: #ffe082; }
    .vis-stat-card .card-icon  { font-size: 22px; margin-bottom: 10px; display: block; }
    .vis-stat-card .card-label { font-size: 11px; font-weight: 600; letter-spacing: .9px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .vis-stat-card .card-value { font-family: 'DM Serif Display', serif; font-size: 34px; line-height: 1; color: #fff; margin-bottom: 4px; }
    .vis-stat-card .card-sub   { font-size: 12px; color: var(--muted); }

    .chart-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; margin-bottom: 28px; }
    .chart-card h3 { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.75); margin-bottom: 20px; }
    .chart-wrap { position: relative; height: 220px; }

    .vis-breakdowns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
    .breakdown-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
    .bc-head { padding: 16px 20px 14px; border-bottom: 1px solid var(--border-color); font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 8px; }
    .bc-icon { font-size: 16px; }
    .breakdown-list { padding: 8px 0; }
    .bd-row { display: flex; align-items: center; gap: 12px; padding: 10px 20px; transition: background .15s; }
    .bd-row:hover { background: rgba(255,255,255,0.025); }
    .bd-label { flex: 1; font-size: 13px; color: rgba(255,255,255,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bd-bar-wrap { flex: 2; height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
    .bd-bar { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.34,1.2,.64,1); }
    .bd-count { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); min-width: 30px; text-align: right; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .vis-loading { text-align: center; padding: 80px 20px; color: var(--muted); }
    .vis-loading .spin { width: 36px; height: 36px; border: 3px solid rgba(76,175,128,0.2); border-top-color: var(--green-light); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
    .no-data-msg { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
    .no-data-msg .nd-icon { font-size: 36px; margin-bottom: 10px; }

    @media (max-width: 720px) { .vis-breakdowns { grid-template-columns: 1fr; } }
    @media (max-width: 640px) {
      .navbar { padding: 0 16px; }
      .container { padding: 24px 16px; }
      .stats-row { flex-direction: column; }
      .vis-controls { flex-direction: column; align-items: stretch; }
      .vis-divider { display: none; }
      table { font-size: 12px; }
      thead th, tbody td { padding: 10px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="#">
    <div class="nav-logo"><img src="https://neu.edu.ph/main/img/neu.png" alt="NEU Logo" /></div>
    <span class="nav-title">NEU <span>Library</span></span>
  </a>
  <div class="nav-right">
  <span class="admin-tag">Admin</span>
  <a href="homepage.html" class="btn-outline">👤 User View</a>
  <button class="btn-outline" onclick="handleLogout()">Log Out</button>
</div>
</nav>
<div class="container">

  <div class="page-title">
    <h1>Admin <em>Dashboard</em></h1>
    <p>Manage registered users and monitor library visitor statistics.</p>
  </div>

  <div class="stats-row">
    <div class="stat-box"><p>Total Users</p><h2 id="stat-users">—</h2></div>
    <div class="stat-box"><p>Today's Visitors</p><h2 id="stat-today">—</h2></div>
    <div class="stat-box"><p>This Week</p><h2 id="stat-week">—</h2></div>
    <div class="stat-box"><p>This Month</p><h2 id="stat-month">—</h2></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('users')">👥 Registered Users</button>
    <button class="tab"        onclick="switchTab('visitors')">📊 Visitor Statistics</button>
  </div>

  <!-- USERS TAB -->
  <div class="tab-content active" id="tab-users">
    <div class="table-panel">
      <div class="table-header">
        <h2>Registered Users</h2>
        <input class="search-box" type="text" id="search-users" placeholder="Search name or college…" oninput="filterUsers()" />
      </div>
      <div id="users-list"><div class="empty-msg"><div class="icon">👥</div>Loading users…</div></div>
    </div>
  </div>

  <!-- VISITOR STATS TAB -->
  <div class="tab-content" id="tab-visitors">

    <div class="vis-controls">
      <div class="ctrl-group">
        <label>Quick Range</label>
        <div class="range-pills">
          <button class="range-pill active" data-range="today"  onclick="setRange('today')">Today</button>
          <button class="range-pill"        data-range="week"   onclick="setRange('week')">This Week</button>
          <button class="range-pill"        data-range="month"  onclick="setRange('month')">This Month</button>
          <button class="range-pill"        data-range="custom" onclick="setRange('custom')">Custom</button>
        </div>
      </div>
      <div class="vis-divider"></div>
      <div class="ctrl-group" id="grp-from" style="display:none">
        <label>From</label>
        <input type="date" id="vis-from" onchange="loadAndRender()" />
      </div>
      <div class="ctrl-group" id="grp-to" style="display:none">
        <label>To</label>
        <input type="date" id="vis-to" onchange="loadAndRender()" />
      </div>
      <div class="vis-divider"></div>
      <div class="ctrl-group">
        <label>Reason for Visit</label>
        <select id="vis-reason" onchange="applyFilters()">
          <option value="">All Reasons</option>
          <option>Book Borrowing</option>
          <option>Reading / Study</option>
          <option>Research</option>
          <option>Internet Use</option>
          <option>Printing / Photocopying</option>
          <option>Thesis / Dissertation</option>
          <option>Group Study</option>
          <option>Consultation</option>
          <option>Other</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>College / Dept.</label>
        <select id="vis-college" onchange="applyFilters()">
          <option value="">All Colleges</option>
          <option value="CAS">CAS</option>
          <option value="CBE">CBE</option>
          <option value="CEd">CEd</option>
          <option value="CEng">CEng</option>
          <option value="CITE">CITE</option>
          <option value="CN">CN</option>
          <option value="CPT">CPT</option>
          <option value="SHS">SHS</option>
          <option value="Staff / Admin">Staff / Admin</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Visitor Type</label>
        <select id="vis-emptype" onchange="applyFilters()">
          <option value="">All Types</option>
          <option value="employee">Employees Only</option>
          <option value="student">Students Only</option>
        </select>
      </div>
    </div>

    <div class="vis-stats" id="vis-stat-cards">
      <div class="vis-loading"><div class="spin"></div>Loading visitor data…</div>
    </div>

    <div class="chart-card" id="vis-chart-card" style="display:none">
      <h3>📈 Daily Visitor Trend</h3>
      <div class="chart-wrap"><canvas id="vis-chart"></canvas></div>
    </div>

    <div class="vis-breakdowns" id="vis-breakdowns"></div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  var SUPA_URL = 'https://fqdlpskyavrsoyjbvksi.supabase.co';
  var SUPA_KEY = 'sb_publishable_nAdhpbEdXTnEqaRv2JAzvg_5k_KUPGP';
  var db = supabase.createClient(SUPA_URL, SUPA_KEY);

  var usersList   = [];
  var visitorRaw  = [];
  var visitorFilt = [];
  var visChart    = null;
  var currentRange = 'today';
  var visInited   = false;
  var toastTimer;

  var BAR_COLORS = ['#4caf80','#90caf9','#ce93d8','#ffb74d','#80cbc4','#ffe082','#ef9a9a','#a5d6a7','#f48fb1','#b0bec5'];

  function toast(msg, isErr) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    isErr ? t.classList.add('error') : t.classList.remove('error');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3500);
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(function(t,i){
      t.classList.toggle('active', (name==='users'&&i===0)||(name==='visitors'&&i===1));
    });
    document.getElementById('tab-users').classList.toggle('active',    name==='users');
    document.getElementById('tab-visitors').classList.toggle('active', name==='visitors');
    if (name==='visitors' && !visInited) { visInited=true; loadAndRender(); }
  }

  async function handleLogout() {
    await db.auth.signOut();
    window.location.href = 'index.html';
  }

  async function fetchUsers() {
    var res = await db.from('profiles').select('*').order('full_name',{ascending:true});
    if (res.error) { toast('Failed to load users.', true); return; }
    usersList = res.data || [];
    showUsers(usersList);
    document.getElementById('stat-users').textContent = usersList.length;
  }

  function showUsers(users) {
    var el = document.getElementById('users-list');
    if (!users.length) { el.innerHTML = '<div class="empty-msg"><div class="icon">👥</div>No users found.</div>'; return; }
    var rows = users.map(function(u){
      var cls = u.role==='faculty' ? 'tag-purple' : u.role==='admin' ? 'tag-green' : 'tag-blue';
      return '<tr><td>'+(u.full_name||'—')+'</td><td><span class="tag '+cls+'">'+(u.role||'—')+'</span></td><td>'+(u.college||'—')+'</td></tr>';
    }).join('');
    el.innerHTML = '<table><thead><tr><th>Full Name</th><th>Role</th><th>College / Dept.</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  function filterUsers() {
    var q = document.getElementById('search-users').value.toLowerCase();
    showUsers(usersList.filter(function(u){
      return (u.full_name||'').toLowerCase().includes(q)||(u.college||'').toLowerCase().includes(q);
    }));
  }

  async function fetchVisitorCounts() {
    var now = new Date();
    var todayStart = new Date(now); todayStart.setHours(0,0,0,0);
    var weekStart  = new Date(now); weekStart.setDate(now.getDate()-now.getDay()); weekStart.setHours(0,0,0,0);
    var monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    var results = await Promise.all([
      db.from('visitor_logs').select('id',{count:'exact',head:true}).gte('visited_at',todayStart.toISOString()),
      db.from('visitor_logs').select('id',{count:'exact',head:true}).gte('visited_at',weekStart.toISOString()),
      db.from('visitor_logs').select('id',{count:'exact',head:true}).gte('visited_at',monthStart.toISOString()),
    ]);
    document.getElementById('stat-today').textContent = results[0].count ?? '—';
    document.getElementById('stat-week').textContent  = results[1].count ?? '—';
    document.getElementById('stat-month').textContent = results[2].count ?? '—';
  }

  function dateStr(d) { return d.toISOString().slice(0,10); }

  function getRangeDates() {
    var now = new Date(); var from, to;
    to = new Date(now); to.setHours(23,59,59,999);
    if (currentRange==='today') {
      from = new Date(now); from.setHours(0,0,0,0);
    } else if (currentRange==='week') {
      from = new Date(now); from.setDate(now.getDate()-now.getDay()); from.setHours(0,0,0,0);
    } else if (currentRange==='month') {
      from = new Date(now.getFullYear(),now.getMonth(),1,0,0,0,0);
    } else {
      var fv=document.getElementById('vis-from').value;
      var tv=document.getElementById('vis-to').value;
      from = fv ? new Date(fv+'T00:00:00') : new Date(now.getFullYear(),now.getMonth(),1);
      to   = tv ? new Date(tv+'T23:59:59') : new Date();
    }
    return { from:from, to:to };
  }

  function setRange(r) {
    currentRange = r;
    document.querySelectorAll('.range-pill').forEach(function(p){ p.classList.toggle('active', p.dataset.range===r); });
    var isCustom = r==='custom';
    document.getElementById('grp-from').style.display = isCustom?'flex':'none';
    document.getElementById('grp-to').style.display   = isCustom?'flex':'none';
    if (!isCustom) loadAndRender();
  }

  async function loadAndRender() {
    document.getElementById('vis-stat-cards').innerHTML = '<div class="vis-loading"><div class="spin"></div>Loading visitor data…</div>';
    document.getElementById('vis-breakdowns').innerHTML = '';
    document.getElementById('vis-chart-card').style.display = 'none';
    var dates = getRangeDates();
    var res = await db.from('visitor_logs').select('id,visited_at,reason,college,is_employee').gte('visited_at',dates.from.toISOString()).lte('visited_at',dates.to.toISOString()).order('visited_at',{ascending:true});
    if (res.error) { toast('Failed to load visitor data.', true); return; }
    visitorRaw = res.data || [];
    applyFilters();
  }

  function applyFilters() {
    var reason  = document.getElementById('vis-reason').value;
    var college = document.getElementById('vis-college').value;
    var emptype = document.getElementById('vis-emptype').value;
    visitorFilt = visitorRaw.filter(function(r){
      if (reason  && r.reason  !== reason)  return false;
      if (college && r.college !== college) return false;
      if (emptype==='employee' && !r.is_employee) return false;
      if (emptype==='student'  &&  r.is_employee) return false;
      return true;
    });
    renderStatCards(visitorFilt);
    renderChart(visitorFilt);
    renderBreakdowns(visitorFilt);
  }

  function renderStatCards(data) {
    var total=data.length, employees=data.filter(function(r){return r.is_employee;}).length, students=total-employees;
    var hmap={};
    data.forEach(function(r){ var h=new Date(r.visited_at).getHours(); hmap[h]=(hmap[h]||0)+1; });
    var peakHour='-',peakVal=0;
    Object.keys(hmap).forEach(function(h){ if(hmap[h]>peakVal){peakVal=hmap[h];peakHour=h;} });
    if (peakHour!=='-') { var ph=parseInt(peakHour); peakHour=(ph%12||12)+(ph<12?'am':'pm'); }
    var days={};
    data.forEach(function(r){ days[r.visited_at.slice(0,10)]=1; });
    var avg=(total/(Object.keys(days).length||1)).toFixed(1);
    var rc=countBy(data,'reason'), topR=topKey(rc)||'—';
    var cards=[
      {icon:'👥',label:'Total Visitors',value:total,   sub:'in selected period',   acc:'acc-green'},
      {icon:'🎓',label:'Students',      value:students, sub:'non-employee visitors',acc:'acc-blue'},
      {icon:'👔',label:'Employees',     value:employees,sub:'faculty & staff',      acc:'acc-purple'},
      {icon:'⏰',label:'Peak Hour',     value:peakHour, sub:'highest traffic',      acc:'acc-orange'},
      {icon:'📈',label:'Daily Avg',     value:avg,      sub:'visitors per day',     acc:'acc-teal'},
      {icon:'📌',label:'Top Reason',    value:topR,     sub:total?(rc[topR]+' visits'):'',acc:'acc-yellow'},
    ];
    document.getElementById('vis-stat-cards').innerHTML=cards.map(function(c){
      return '<div class="vis-stat-card '+c.acc+'"><span class="card-icon">'+c.icon+'</span><div class="card-label">'+c.label+'</div><div class="card-value">'+c.value+'</div><div class="card-sub">'+c.sub+'</div></div>';
    }).join('');
  }

  function renderChart(data) {
    var card=document.getElementById('vis-chart-card');
    if (!data.length) { card.style.display='none'; return; }
    card.style.display='block';
    var dates=getRangeDates(), dayMap={};
    data.forEach(function(r){ var d=r.visited_at.slice(0,10); dayMap[d]=(dayMap[d]||0)+1; });
    var labels=[],counts=[];
    var cur=new Date(dates.from); cur.setHours(0,0,0,0);
    while (cur<=dates.to) { var key=dateStr(cur); labels.push(key.slice(5)); counts.push(dayMap[key]||0); cur.setDate(cur.getDate()+1); }
    if (labels.length<=1) {
      var hmap={}; for(var h=0;h<24;h++) hmap[h]=0;
      data.forEach(function(r){ hmap[new Date(r.visited_at).getHours()]++; });
      labels=Object.keys(hmap).map(function(h){ var p=parseInt(h); return (p%12||12)+(p<12?'am':'pm'); });
      counts=Object.values(hmap);
    }
    var ctx=document.getElementById('vis-chart').getContext('2d');
    if (visChart) visChart.destroy();
    visChart=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:'Visitors',data:counts,backgroundColor:'rgba(76,175,128,0.35)',borderColor:'rgba(76,175,128,0.85)',borderWidth:1.5,borderRadius:4,hoverBackgroundColor:'rgba(76,175,128,0.55)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#0e1f33',borderColor:'rgba(76,175,128,0.4)',borderWidth:1,titleColor:'#fff',bodyColor:'rgba(255,255,255,0.7)',padding:10}},scales:{x:{ticks:{color:'rgba(255,255,255,0.35)',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'rgba(255,255,255,0.35)',font:{size:11},stepSize:1},grid:{color:'rgba(255,255,255,0.06)'},beginAtZero:true}}}});
  }

  function renderBreakdowns(data) {
    var el=document.getElementById('vis-breakdowns');
    if (!data.length) { el.innerHTML='<div class="no-data-msg" style="grid-column:1/-1"><div class="nd-icon">🔍</div>No visitor data for this period.</div>'; return; }
    el.innerHTML=buildBreakdown('📋','Reason for Visit',countBy(data,'reason'))+buildBreakdown('🏫','College / Department',countBy(data,'college'));
  }

  function buildBreakdown(icon,title,counts) {
    var entries=Object.entries(counts).sort(function(a,b){return b[1]-a[1];}), max=entries.length?entries[0][1]:1;
    if (!entries.length) return '<div class="breakdown-card"><div class="bc-head"><span class="bc-icon">'+icon+'</span>'+title+'</div><div class="breakdown-list"><div class="no-data-msg" style="padding:20px">No data.</div></div></div>';
    var rows=entries.map(function(e,i){ var pct=Math.round((e[1]/max)*100); return '<div class="bd-row"><div class="bd-label">'+(e[0]||'Unknown')+'</div><div class="bd-bar-wrap"><div class="bd-bar" style="width:'+pct+'%;background:'+BAR_COLORS[i%BAR_COLORS.length]+'"></div></div><div class="bd-count">'+e[1]+'</div></div>'; }).join('');
    return '<div class="breakdown-card"><div class="bc-head"><span class="bc-icon">'+icon+'</span>'+title+'</div><div class="breakdown-list">'+rows+'</div></div>';
  }

  function countBy(arr,key){ var out={}; arr.forEach(function(r){ var v=r[key]||'Unknown'; out[v]=(out[v]||0)+1; }); return out; }
  function topKey(obj){ var best=null,bv=0; Object.keys(obj).forEach(function(k){ if(obj[k]>bv){bv=obj[k];best=k;} }); return best; }

  fetchUsers();
  fetchVisitorCounts();
</script>
</body>
</html>

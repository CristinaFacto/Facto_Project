<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEU Library - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2e7d52;
      --green-dark: #256645;
      --green-light: #4caf80;
      --bg-main: #081525;
      --bg-card: #0e1f33;
      --bg-card2: #112540;
      --border-color: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.45);
      --input-bg: rgba(255,255,255,0.06);
      --input-border: rgba(255,255,255,0.12);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg-main);
      color: #fff;
      min-height: 100vh;
      padding-top: 62px;
    }

    /* ── navbar ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 62px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 36px;
      background: rgba(8,21,37,0.9); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-color); z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo { width: 32px; height: 32px; border-radius: 7px; overflow: hidden; }
    .nav-logo img { width: 100%; height: 100%; object-fit: contain; }
    .nav-title { font-family: 'DM Serif Display', serif; font-size: 15px; color: #fff; }
    .nav-title span { color: var(--green-light); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .admin-tag {
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--green-light); background: rgba(76,175,128,0.12);
      border: 1px solid rgba(76,175,128,0.25); padding: 4px 10px; border-radius: 20px;
    }
    .btn-outline {
      padding: 8px 20px; background: transparent;
      border: 1px solid rgba(255,255,255,0.18); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.65); cursor: pointer; transition: border-color .2s, color .2s;
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

    /* ── layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 36px 24px; }
    .page-title { margin-bottom: 32px; }
    .page-title h1 { font-family: 'DM Serif Display', serif; font-size: 32px; color: #fff; margin-bottom: 4px; }
    .page-title h1 em { font-style: italic; color: var(--green-light); }
    .page-title p { font-size: 13.5px; color: var(--muted); }

    /* ── stats row ── */
    .stats-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
    .stat-box {
      flex: 1; min-width: 140px; background: var(--bg-card);
      border: 1px solid var(--border-color); border-radius: 10px; padding: 18px 20px;
    }
    .stat-box p { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-box h2 { font-family: 'DM Serif Display', serif; font-size: 28px; color: #fff; }

    /* ── tabs ── */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border-color); margin-bottom: 32px; }
    .tab {
      padding: 10px 20px; background: transparent; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500;
      color: var(--muted); cursor: pointer; transition: color .2s, border-color .2s;
    }
    .tab.active { color: #fff; border-bottom-color: var(--green-light); }
    .tab:hover:not(.active) { color: rgba(255,255,255,0.7); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── form ── */
    .section-label { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .form-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; margin-bottom: 32px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-row .col-full { grid-column: 1 / -1; }
    .input-group { display: flex; flex-direction: column; }
    .input-group label { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .input-group input,
    .input-group select,
    .input-group textarea {
      background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: 7px; padding: 10px 13px; font-size: 13.5px; color: #fff;
      font-family: 'DM Sans', sans-serif; outline: none; width: 100%;
      transition: border-color .18s; -webkit-appearance: none;
    }
    .input-group textarea { resize: vertical; min-height: 80px; }
    .input-group input::placeholder, .input-group textarea::placeholder { color: rgba(255,255,255,0.2); }
    .input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: var(--green-light); }
    .input-group select option { background: #0e1f33; }
    .form-footer { display: flex; justify-content: flex-end; }
    .btn-green {
      padding: 10px 28px; background: var(--green); border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600;
      color: #fff; cursor: pointer; transition: background .18s, opacity .18s;
    }
    .btn-green:hover { background: var(--green-dark); }
    .btn-green:disabled { opacity: .5; cursor: not-allowed; }
    .btn-gray {
      padding: 10px 20px; background: transparent; border: 1px solid var(--input-border);
      border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500;
      color: var(--muted); cursor: pointer; transition: border-color .18s, color .18s;
    }
    .btn-gray:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

    /* ── table ── */
    .table-panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border-color); }
    .table-header h2 { font-size: 15px; font-weight: 600; color: #fff; }
    .search-box {
      background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: 7px; padding: 8px 13px; font-size: 13px; color: #fff;
      font-family: 'DM Sans', sans-serif; outline: none; width: 220px; transition: border-color .18s;
    }
    .search-box::placeholder { color: rgba(255,255,255,0.22); }
    .search-box:focus { border-color: var(--green-light); }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border-color); }
    thead th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody td { padding: 14px 16px; font-size: 13.5px; color: rgba(255,255,255,0.85); vertical-align: middle; }
    .cover-img { width: 36px; height: 48px; border-radius: 4px; object-fit: cover; display: block; }
    .cover-placeholder { width: 36px; height: 48px; border-radius: 4px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 18px; }

    .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .tag-green  { background: rgba(76,175,128,0.12); border: 1px solid rgba(76,175,128,0.22); color: var(--green-light); }
    .tag-orange { background: rgba(255,152,0,0.12);  border: 1px solid rgba(255,152,0,0.22);  color: #ffb74d; }
    .tag-red    { background: rgba(192,57,43,0.12);  border: 1px solid rgba(192,57,43,0.22);  color: #ef9a9a; }
    .tag-blue   { background: rgba(66,165,245,0.12); border: 1px solid rgba(66,165,245,0.22); color: #90caf9; }
    .tag-purple { background: rgba(171,71,188,0.12); border: 1px solid rgba(171,71,188,0.22); color: #ce93d8; }
    .tag-teal   { background: rgba(38,166,154,0.12); border: 1px solid rgba(38,166,154,0.22); color: #80cbc4; }
    .tag-yellow { background: rgba(255,214,0,0.10);  border: 1px solid rgba(255,214,0,0.22);  color: #ffe082; }

    .action-group { display: flex; gap: 8px; }
    .btn-edit { padding: 6px 14px; border-radius: 6px; background: rgba(66,165,245,0.1); border: 1px solid rgba(66,165,245,0.2); font-size: 12px; font-weight: 500; color: #90caf9; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .15s; }
    .btn-edit:hover { background: rgba(66,165,245,0.2); }
    .btn-del  { padding: 6px 14px; border-radius: 6px; background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.2); font-size: 12px; font-weight: 500; color: #ef9a9a; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .15s; }
    .btn-del:hover { background: rgba(192,57,43,0.2); }

    .empty-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .empty-msg .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── modal ── */
    .modal-bg { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px; padding: 28px; width: min(500px,92vw); max-height: 90vh; overflow-y: auto; }
    .modal-box h3 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 20px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }

    /* ── toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #1b3a28; border: 1px solid var(--green);
      color: #fff; padding: 11px 24px; border-radius: 7px;
      font-size: 13px; font-weight: 500;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #3a1b1b; border-color: #c0392b; }

    /* ════════════════════════════════════════════
       VISITOR STATISTICS TAB
    ════════════════════════════════════════════ */

    /* control bar */
    .vis-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 28px;
    }

    .vis-controls .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 140px;
    }

    .vis-controls .ctrl-group label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .vis-controls input[type="date"],
    .vis-controls select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 13px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color .18s;
      -webkit-appearance: none;
      color-scheme: dark;
    }

    .vis-controls input[type="date"]:focus,
    .vis-controls select:focus {
      border-color: var(--green-light);
    }

    .vis-controls select option { background: #0e1f33; }

    /* range pills */
    .range-pills {
      display: flex;
      gap: 6px;
    }

    .range-pill {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--muted);
      cursor: pointer;
      transition: all .18s;
      font-family: 'DM Sans', sans-serif;
    }

    .range-pill.active,
    .range-pill:hover {
      background: rgba(76,175,128,0.15);
      border-color: rgba(76,175,128,0.35);
      color: var(--green-light);
    }

    .vis-divider {
      width: 1px;
      height: 38px;
      background: var(--border-color);
      align-self: flex-end;
      margin: 0 4px;
    }

    /* summary stat cards */
    .vis-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .vis-stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
    }

    .vis-stat-card:hover {
      border-color: rgba(76,175,128,0.2);
      transform: translateY(-1px);
    }

    .vis-stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 12px 12px 0 0;
    }

    .vis-stat-card.accent-green::before  { background: var(--green-light); }
    .vis-stat-card.accent-blue::before   { background: #90caf9; }
    .vis-stat-card.accent-purple::before { background: #ce93d8; }
    .vis-stat-card.accent-orange::before { background: #ffb74d; }
    .vis-stat-card.accent-teal::before   { background: #80cbc4; }
    .vis-stat-card.accent-yellow::before { background: #ffe082; }

    .vis-stat-card .card-icon {
      font-size: 22px;
      margin-bottom: 10px;
      display: block;
    }

    .vis-stat-card .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .9px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .vis-stat-card .card-value {
      font-family: 'DM Serif Display', serif;
      font-size: 34px;
      line-height: 1;
      color: #fff;
      margin-bottom: 4px;
    }

    .vis-stat-card .card-sub {
      font-size: 12px;
      color: var(--muted);
    }

    /* breakdown cards */
    .vis-breakdowns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }

    @media (max-width: 720px) {
      .vis-breakdowns { grid-template-columns: 1fr; }
    }

    .breakdown-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
    }

    .breakdown-card .bc-head {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border-color);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bc-head .bc-icon { font-size: 16px; }

    .breakdown-list { padding: 8px 0; }

    .bd-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      transition: background .15s;
    }

    .bd-row:hover { background: rgba(255,255,255,0.025); }

    .bd-label {
      flex: 1;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bd-bar-wrap {
      flex: 2;
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      overflow: hidden;
    }

    .bd-bar {
      height: 100%;
      border-radius: 3px;
      transition: width .5s cubic-bezier(.34,1.2,.64,1);
    }

    .bd-count {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      min-width: 30px;
      text-align: right;
    }

    /* chart card */
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .chart-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-wrap { position: relative; height: 220px; }

    /* trend */
    .vis-trend {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
    }
    .trend-up   { color: var(--green-light); }
    .trend-down { color: #ef9a9a; }
    .trend-flat { color: var(--muted); }

    /* loading skeleton */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }

    .vis-loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .vis-loading .spin {
      width: 36px; height: 36px;
      border: 3px solid rgba(76,175,128,0.2);
      border-top-color: var(--green-light);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-data-msg {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .no-data-msg .icon { font-size: 36px; margin-bottom: 10px; }

    /* ── responsive ── */
    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
      .form-row .col-full { grid-column: 1; }
      .navbar { padding: 0 16px; }
      .container { padding: 24px 16px; }
      .stats-row { flex-direction: column; }
      table { font-size: 12px; }
      thead th, tbody td { padding: 10px; }
      .vis-controls { flex-direction: column; align-items: stretch; }
      .vis-divider { display: none; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="#">
    <div class="nav-logo"><img src="https://neu.edu.ph/main/img/neu.png" alt="NEU Logo" /></div>
    <span class="nav-title">NEU <span>Library</span></span>
  </a>
  <div class="nav-right">
    <span class="admin-tag">Admin</span>
    <button class="btn-outline" onclick="handleLogout()">Log Out</button>
  </div>
</nav>

<div class="container">

  <div class="page-title">
    <h1>Admin <em>Dashboard</em></h1>
    <p>Manage books, view registered users, and monitor visitor statistics.</p>
  </div>

  <div class="stats-row">
    <div class="stat-box"><p>Total Books</p><h2 id="stat-total">—</h2></div>
    <div class="stat-box"><p>Available</p><h2 id="stat-available">—</h2></div>
    <div class="stat-box"><p>Low Stock</p><h2 id="stat-low">—</h2></div>
    <div class="stat-box"><p>Out of Stock</p><h2 id="stat-out">—</h2></div>
    <div class="stat-box"><p>Total Users</p><h2 id="stat-users">—</h2></div>
  </div>

  <div class="tabs">
    <button class="tab active"  onclick="switchTab('books')">📚 Manage Books</button>
    <button class="tab"         onclick="switchTab('users')">👥 Registered Users</button>
    <button class="tab"         onclick="switchTab('visitors')">📊 Visitor Stats</button>
  </div>

  <!-- ══ BOOKS TAB ══ -->
  <div class="tab-content active" id="tab-books">
    <div class="section-label">Add New Book</div>
    <div class="form-card">
      <div class="form-row">
        <div class="input-group"><label>Title</label><input type="text" id="add-title" placeholder="Book title" /></div>
        <div class="input-group"><label>Author</label><input type="text" id="add-author" placeholder="Author name" /></div>
        <div class="input-group">
          <label>Category</label>
          <select id="add-category">
            <option value="" disabled selected>Select category</option>
            <option>Fiction</option><option>Non-Fiction</option><option>Science &amp; Technology</option>
            <option>History</option><option>Mathematics</option><option>Engineering</option>
            <option>Medicine &amp; Health</option><option>Law</option><option>Business &amp; Economics</option>
            <option>Education</option><option>Arts &amp; Music</option><option>Reference</option><option>Other</option>
          </select>
        </div>
        <div class="input-group"><label>Available Copies</label><input type="number" id="add-copies" placeholder="e.g. 5" min="0" /></div>
        <div class="input-group col-full"><label>Cover Image URL</label><input type="url" id="add-cover" placeholder="https://... (optional)" /></div>
        <div class="input-group col-full"><label>Description</label><textarea id="add-desc" placeholder="Short description of the book..."></textarea></div>
      </div>
      <div class="form-footer"><button class="btn-green" id="add-btn" onclick="handleAddBook()">Add Book</button></div>
    </div>

    <div class="table-panel">
      <div class="table-header">
        <h2>All Books</h2>
        <input class="search-box" type="text" id="search-books" placeholder="Search title or author…" oninput="filterBooks()" />
      </div>
      <div id="books-list"><div class="empty-msg"><div class="icon">📚</div>Loading books...</div></div>

/* ═══════════════════════════════════════════════════════════════
   VISITOR STATISTICS
   Assumes a Supabase table: visitor_logs
   Columns: id, visited_at (timestamptz), reason (text),
            college (text), is_employee (bool)
═══════════════════════════════════════════════════════════════ */

var visitorData   = [];        // raw fetched rows
var filteredData  = [];        // after active filters
var visChart      = null;
var currentRange  = 'today';
var visInited     = false;

/* colour palette for bar segments */
var BAR_COLORS = [
  '#4caf80','#90caf9','#ce93d8','#ffb74d','#80cbc4',
  '#ffe082','#ef9a9a','#a5d6a7','#f48fb1','#b0bec5'
];

/* ── date helpers ── */
function dateStr(d) {
  return d.toISOString().slice(0,10);
}

function getRangeDates(range) {
  var now = new Date();
  var from, to;
  to = new Date(now); to.setHours(23,59,59,999);

  if (range === 'today') {
    from = new Date(now); from.setHours(0,0,0,0);
  } else if (range === 'week') {
    from = new Date(now);
    var day = from.getDay();
    from.setDate(from.getDate() - day);
    from.setHours(0,0,0,0);
  } else if (range === 'month') {
    from = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0, 0);
  } else {
    // custom — read from inputs
    var fv = document.getElementById('vis-from').value;
    var tv = document.getElementById('vis-to').value;
    from = fv ? new Date(fv + 'T00:00:00') : new Date(now.getFullYear(), now.getMonth(), 1);
    to   = tv ? new Date(tv + 'T23:59:59') : new Date();
  }
  return { from: from, to: to };
}

/* ── fetch ── */
async function fetchVisitorData(range) {
  var dates = getRangeDates(range);
  var q = db.from('visitor_logs')
    .select('id, visited_at, reason, college, is_employee')
    .gte('visited_at', dates.from.toISOString())
    .lte('visited_at', dates.to.toISOString())
    .order('visited_at', { ascending: true });

  var result = await q;
  if (result.error) {
    toast('Failed to load visitor data.', true);
    return [];
  }
  return result.data || [];
}

/* ── init (called once per tab open) ── */
async function initVisitorStats() {
  if (visInited) { applyFilters(); return; }
  visInited = true;
  setRange('today', true);
}

/* ── range pills ── */
function setRange(range, skipFetch) {
  currentRange = range;
  document.querySelectorAll('.range-pill').forEach(function(p){
    p.classList.toggle('active', p.dataset.range === range);
  });
  var isCustom = range === 'custom';
  document.getElementById('custom-from-group').style.display = isCustom ? 'flex' : 'none';
  document.getElementById('custom-to-group').style.display   = isCustom ? 'flex' : 'none';

  if (!skipFetch) loadAndRender();
}

/* ── load + render pipeline ── */
async function loadAndRender() {
  renderLoading();
  visitorData  = await fetchVisitorData(currentRange);
  applyFilters();
}

/* ── apply dropdown filters on already-fetched data ── */
function applyFilters() {
  var reason  = document.getElementById('vis-reason').value;
  var college = document.getElementById('vis-college').value;
  var emptype = document.getElementById('vis-emptype').value;

  // If custom range, re-fetch (dates may have changed)
  if (currentRange === 'custom') {
    loadAndRender();
    return;
  }

  filteredData = visitorData.filter(function(r){
    if (reason  && r.reason  !== reason)  return false;
    if (college && r.college !== college) return false;
    if (emptype === 'employee' && !r.is_employee) return false;
    if (emptype === 'student'  &&  r.is_employee) return false;
    return true;
  });

  renderAll(filteredData);
}

/* ── loading placeholder ── */
function renderLoading() {
  document.getElementById('vis-stat-cards').innerHTML =
    '<div class="vis-loading"><div class="spin"></div>Fetching visitor data…</div>';
  document.getElementById('vis-breakdowns').innerHTML = '';
  document.getElementById('vis-chart-card').style.display = 'none';
}

/* ── main render ── */
function renderAll(data) {
  renderStatCards(data);
  renderChart(data);
  renderBreakdowns(data);
}

/* ── stat cards ── */
function renderStatCards(data) {
  var total     = data.length;
  var employees = data.filter(function(r){ return r.is_employee; }).length;
  var students  = total - employees;

  // peak hour
  var hourCounts = {};
  data.forEach(function(r){
    var h = new Date(r.visited_at).getHours();
    hourCounts[h] = (hourCounts[h]||0) + 1;
  });
  var peakHour = '-';
  var peakCount = 0;
  Object.keys(hourCounts).forEach(function(h){
    if (hourCounts[h] > peakCount) { peakCount = hourCounts[h]; peakHour = h; }
  });
  if (peakHour !== '-') {
    var ph = parseInt(peakHour);
    peakHour = (ph % 12 || 12) + (ph < 12 ? 'am' : 'pm');
  }

  // unique dates (for avg)
  var days = {};
  data.forEach(function(r){ days[r.visited_at.slice(0,10)] = 1; });
  var dayCount = Object.keys(days).length || 1;
  var avg = (total / dayCount).toFixed(1);

  // top reason
  var reasonCounts = countBy(data, 'reason');
  var topReason = topKey(reasonCounts) || '—';

  // top college
  var collegeCounts = countBy(data, 'college');
  var topCollege = topKey(collegeCounts) || '—';

  var cards = [
    { icon:'👥', label:'Total Visitors', value: total,     sub:'in selected period',    accent:'accent-green'  },
    { icon:'🎓', label:'Students',        value: students,  sub:'non-employee visitors', accent:'accent-blue'   },
    { icon:'👔', label:'Employees',       value: employees, sub:'faculty & staff',       accent:'accent-purple' },
    { icon:'⏰', label:'Peak Hour',       value: peakHour,  sub:'highest traffic',       accent:'accent-orange' },
    { icon:'📈', label:'Daily Avg',       value: avg,       sub:'visitors per day',      accent:'accent-teal'   },
    { icon:'📌', label:'Top Reason',      value: topReason, sub: total ? reasonCounts[topReason] + ' visits' : '', accent:'accent-yellow' },
  ];

  var html = '';
  cards.forEach(function(c){
    html += '<div class="vis-stat-card ' + c.accent + '">';
    html += '<span class="card-icon">' + c.icon + '</span>';
    html += '<div class="card-label">' + c.label + '</div>';
    html += '<div class="card-value">' + c.value + '</div>';
    html += '<div class="card-sub">'   + c.sub   + '</div>';
    html += '</div>';
  });

  document.getElementById('vis-stat-cards').innerHTML = html;
}

/* ── trend chart ── */
function renderChart(data) {
  var card = document.getElementById('vis-chart-card');

  if (!data.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';

  // bucket by date
  var dayMap = {};
  data.forEach(function(r){
    var d = r.visited_at.slice(0,10);
    dayMap[d] = (dayMap[d]||0) + 1;
  });

  // fill all days in range
  var dates = getRangeDates(currentRange);
  var labels = [], counts = [];
  var cur = new Date(dates.from);
  cur.setHours(0,0,0,0);
  var endD = new Date(dates.to);
  while (cur <= endD) {
    var key = dateStr(cur);
    labels.push(key.slice(5)); // MM-DD
    counts.push(dayMap[key]||0);
    cur.setDate(cur.getDate()+1);
  }

  // single day → show by hour instead
  if (labels.length <= 1) {
    var hourMap = {};
    for (var hh = 0; hh < 24; hh++) hourMap[hh] = 0;
    data.forEach(function(r){ var h = new Date(r.visited_at).getHours(); hourMap[h]++; });
    labels = Object.keys(hourMap).map(function(h){ return (parseInt(h)%12||12) + (parseInt(h)<12?'am':'pm'); });
    counts = Object.values(hourMap);
  }

  var ctx = document.getElementById('vis-chart').getContext('2d');
  if (visChart) { visChart.destroy(); }

  visChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Visitors',
        data: counts,
        backgroundColor: 'rgba(76,175,128,0.35)',
        borderColor: 'rgba(76,175,128,0.85)',
        borderWidth: 1.5,
        borderRadius: 4,
        hoverBackgroundColor: 'rgba(76,175,128,0.55)',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0e1f33',
          borderColor: 'rgba(76,175,128,0.4)',
          borderWidth: 1,
          titleColor: '#fff',
          bodyColor: 'rgba(255,255,255,0.7)',
          padding: 10,
        }
      },
      scales: {
        x: {
          ticks: { color: 'rgba(255,255,255,0.35)', font: { size: 11 } },
          grid: { color: 'rgba(255,255,255,0.04)' }
        },
        y: {
          ticks: { color: 'rgba(255,255,255,0.35)', font: { size: 11 }, stepSize: 1 },
          grid: { color: 'rgba(255,255,255,0.06)' },
          beginAtZero: true
        }
      }
    }
  });
}

/* ── breakdown cards ── */
function renderBreakdowns(data) {
  var container = document.getElementById('vis-breakdowns');

  if (!data.length) {
    container.innerHTML = '<div class="no-data-msg"><div class="icon">🔍</div>No visitor data for this period.</div>';
    return;
  }

  var reasonCounts  = countBy(data, 'reason');
  var collegeCounts = countBy(data, 'college');

  container.innerHTML =
    buildBreakdownCard('📋', 'Reason for Visit', reasonCounts, '#4caf80') +
    buildBreakdownCard('🏫', 'College / Department', collegeCounts, '#90caf9');
}

function buildBreakdownCard(icon, title, counts, color) {
  var entries = Object.entries(counts).sort(function(a,b){ return b[1]-a[1]; });
  var max = entries.length ? entries[0][1] : 1;

  if (!entries.length) {
    return '<div class="breakdown-card"><div class="bc-head"><span class="bc-icon">' + icon + '</span>' + title + '</div><div class="breakdown-list"><div class="no-data-msg" style="padding:20px">No data.</div></div></div>';
  }

  var rows = '';
  entries.forEach(function(e, i){
    var pct = Math.round((e[1]/max)*100);
    var barColor = BAR_COLORS[i % BAR_COLORS.length];
    rows += '<div class="bd-row">';
    rows += '<div class="bd-label">' + (e[0]||'Unknown') + '</div>';
    rows += '<div class="bd-bar-wrap"><div class="bd-bar" style="width:' + pct + '%;background:' + barColor + '"></div></div>';
    rows += '<div class="bd-count">' + e[1] + '</div>';
    rows += '</div>';
  });

  return '<div class="breakdown-card"><div class="bc-head"><span class="bc-icon">' + icon + '</span>' + title + '</div><div class="breakdown-list">' + rows + '</div></div>';
}

/* ── helpers ── */
function countBy(arr, key) {
  var out = {};
  arr.forEach(function(r){ var v = r[key]||'Unknown'; out[v]=(out[v]||0)+1; });
  return out;
}

function topKey(obj) {
  var best = null, bestVal = 0;
  Object.keys(obj).forEach(function(k){ if (obj[k]>bestVal){ bestVal=obj[k]; best=k; } });
  return best;
}

</script>

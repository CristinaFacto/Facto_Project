<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEU Library - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2e7d52;
      --green-dark: #1f5c3a;
      --green-light: #4caf80;
      --bg: #081525;
      --card-bg: #0d1e30;
      --border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.42);
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.11);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-image {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('https://media.licdn.com/dms/image/v2/C561BAQGUxB_pssZkJA/company-background_10000/company-background_10000/0/1591598531597/new_era_university_official_cover?e=2147483647&v=beta&t=F_JgSz6bKmQ4QdmSivXkthtoQ-7j0KNvpoWiwut8y8A');
      background-size: cover;
      background-position: center;
      filter: brightness(0.13);
    }

    .navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 62px;
      display: flex; align-items: center; padding: 0 36px;
      background: rgba(8,21,37,0.88); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border); z-index: 10;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo  { width: 32px; height: 32px; border-radius: 7px; overflow: hidden; }
    .nav-logo img { width: 100%; height: 100%; object-fit: contain; }
    .nav-title { font-family: 'DM Serif Display', serif; font-size: 15px; color: #fff; }
    .nav-title span { color: var(--green-light); }

    .card {
      position: relative; z-index: 2;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: min(420px, 92vw);
      animation: fadeUp 0.7s ease both;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 36px; right: 36px;
      height: 2px; border-radius: 0 0 2px 2px;
      background: linear-gradient(90deg, var(--green-light), transparent);
    }

    .card-logo { width: 52px; height: 52px; border-radius: 12px; overflow: hidden; margin: 0 auto 20px; }
    .card-logo img { width: 100%; height: 100%; object-fit: contain; }

    .card h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: #fff; text-align: center; margin-bottom: 6px; }
    .card h1 em { font-style: italic; color: var(--green-light); }
    .card p  { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 28px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .9px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: 9px; padding: 11px 14px; font-size: 13.5px; color: #fff;
      font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .18s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.2); }
    .field input:focus { border-color: var(--green-light); }

    .btn-login {
      width: 100%; padding: 13px; background: var(--green); border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: #fff;
      cursor: pointer; margin-top: 8px; transition: background .18s, box-shadow .18s;
    }
    .btn-login:hover { background: var(--green-dark); box-shadow: 0 6px 24px rgba(46,125,82,0.35); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }

    .error-msg { font-size: 12.5px; color: #ef9a9a; margin-top: 12px; text-align: center; min-height: 18px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>

  <nav class="navbar">
    <a class="nav-brand" href="#">
      <div class="nav-logo"><img src="https://neu.edu.ph/main/img/neu.png" alt="NEU Logo" /></div>
      <span class="nav-title">NEU <span>Library</span></span>
    </a>
  </nav>

  <div class="card">
    <div class="card-logo"><img src="https://neu.edu.ph/main/img/neu.png" alt="NEU Logo" /></div>
    <h1>Sign in to <em>Library</em></h1>
    <p>New Era University — Library Portal</p>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@neu.edu.ph" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') handleLogin()" />
    </div>

    <button class="btn-login" id="login-btn" onclick="handleLogin()">Sign In</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <script>
    var SUPA_URL = 'https://fqdlpskyavrsoyjbvksi.supabase.co';
    var SUPA_KEY = 'sb_publishable_nAdhpbEdXTnEqaRv2JAzvg_5k_KUPGP';
    var db = supabase.createClient(SUPA_URL, SUPA_KEY);

    async function handleLogin() {
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var btn      = document.getElementById('login-btn');
      var errEl    = document.getElementById('error-msg');
      errEl.textContent = '';

      if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; return; }

      btn.disabled = true; btn.textContent = 'Signing in…';

      var { data, error } = await db.auth.signInWithPassword({ email: email, password: password });

      btn.disabled = false; btn.textContent = 'Sign In';

      if (error) { errEl.textContent = error.message; return; }

      var { data: profile } = await db.from('profiles').select('role').eq('id', data.user.id).single();

      if (profile && profile.role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'home.html';
      }
    }

    (async function checkSession() {
      var { data: { session } } = await db.auth.getSession();
      if (!session) return;
      var { data: profile } = await db.from('profiles').select('role').eq('id', session.user.id).single();
      window.location.href = (profile && profile.role === 'admin') ? 'admin.html' : 'home.html';
    })();
  </script>
</body>
</html>
